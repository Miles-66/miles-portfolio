/* ===== Helpers ===== */
function escapeHTML(s) {
  return (s || '').replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
}
function buildMeta(w, likesClass) {
  const parts = [];
  if (w.date) parts.push(escapeHTML(w.date));
  if (w.likes) parts.push(`<span class="${likesClass}">${escapeHTML(w.likes)} 赞</span>`);
  if (w.extra) parts.push(escapeHTML(w.extra));
  return parts.join(' · ');
}

/* ===== Minimal Markdown → HTML ===== */
function mdInline(text) {
  text = text.replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
  text = text.replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  return text;
}
function parseMdTableRow(line) {
  let s = line.trim();
  if (s.startsWith('|')) s = s.slice(1);
  if (s.endsWith('|')) s = s.slice(0, -1);
  return s.split('|').map(c => c.trim());
}
function renderMdTable(header, rows) {
  const numCols = Math.max(header.length, ...rows.map(r => r.length));
  // Normalize each row to numCols
  const cells = rows.map(r => {
    const arr = r.slice();
    while (arr.length < numCols) arr.push('');
    return arr.map(c => ({ content: c, render: true, rowspan: 1 }));
  });
  // Auto-rowspan: empty cell inherits from most recent non-empty in same column
  for (let col = 0; col < numCols; col++) {
    let anchor = -1;
    for (let r = 0; r < cells.length; r++) {
      if (cells[r][col].content === '' && anchor >= 0) {
        cells[anchor][col].rowspan++;
        cells[r][col].render = false;
      } else if (cells[r][col].content !== '') {
        anchor = r;
      }
    }
  }
  const thead = `<thead><tr>${header.map(h => `<th>${mdInline(h)}</th>`).join('')}</tr></thead>`;
  const tbody = `<tbody>${cells.map(row =>
    `<tr>${row.filter(c => c.render).map(c => {
      const span = c.rowspan > 1 ? ` rowspan="${c.rowspan}"` : '';
      return `<td${span}>${mdInline(c.content)}</td>`;
    }).join('')}</tr>`
  ).join('')}</tbody>`;
  return `<table>${thead}${tbody}</table>`;
}
function markdownToHTML(md) {
  md = md.replace(/\r\n/g, '\n');
  const lines = md.split('\n');
  const out = [];
  let i = 0;
  const isBlockStart = (l) =>
    /^\s*$/.test(l) || /^#{1,6}\s/.test(l) || /^[\-*]\s/.test(l) ||
    /^\d+\.\s/.test(l) || /^>\s?/.test(l) || /^---+\s*$/.test(l) ||
    /^```/.test(l) || /^\s*\|.*\|\s*$/.test(l);
  while (i < lines.length) {
    const L = lines[i];
    if (/^---+\s*$/.test(L)) { out.push('<hr>'); i++; continue; }
    const h = L.match(/^(#{1,6})\s+(.+)$/);
    if (h) {
      const cls = h[1].length === 1 ? 'outline-title' : 'outline-head';
      out.push(`<p class="${cls}">${mdInline(h[2])}</p>`);
      i++; continue;
    }
    // Table: header row + separator row + body rows
    if (/^\s*\|.+\|\s*$/.test(L) && i + 1 < lines.length && /^\s*\|?[\s:\-|]+\|?\s*$/.test(lines[i+1]) && lines[i+1].includes('-')) {
      const header = parseMdTableRow(L);
      i += 2;
      const rows = [];
      while (i < lines.length && /^\s*\|.*\|\s*$/.test(lines[i])) {
        rows.push(parseMdTableRow(lines[i]));
        i++;
      }
      out.push(renderMdTable(header, rows));
      continue;
    }
    if (/^```/.test(L)) {
      const code = [];
      i++;
      while (i < lines.length && !/^```/.test(lines[i])) { code.push(lines[i]); i++; }
      i++;
      out.push(`<pre><code>${code.join('\n').replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}</code></pre>`);
      continue;
    }
    if (/^[\-*]\s+/.test(L)) {
      const items = [];
      while (i < lines.length && /^[\-*]\s+/.test(lines[i])) {
        items.push(lines[i].replace(/^[\-*]\s+/, ''));
        i++;
      }
      out.push(`<ul>${items.map(t => `<li>${mdInline(t)}</li>`).join('')}</ul>`);
      continue;
    }
    if (/^\d+\.\s+/.test(L)) {
      const items = [];
      while (i < lines.length && /^\d+\.\s+/.test(lines[i])) {
        items.push(lines[i].replace(/^\d+\.\s+/, ''));
        i++;
      }
      out.push(`<ol>${items.map(t => `<li>${mdInline(t)}</li>`).join('')}</ol>`);
      continue;
    }
    if (/^>\s?/.test(L)) {
      const quoted = [];
      while (i < lines.length && /^>\s?/.test(lines[i])) {
        quoted.push(lines[i].replace(/^>\s?/, ''));
        i++;
      }
      out.push(`<blockquote>${mdInline(quoted.join(' '))}</blockquote>`);
      continue;
    }
    if (/^\s*$/.test(L)) { i++; continue; }
    const para = [];
    while (i < lines.length && !isBlockStart(lines[i])) { para.push(lines[i]); i++; }
    if (para.length) out.push(`<p>${mdInline(para.join(' '))}</p>`);
  }
  return out.join('\n');
}

/* ===== Carousel auto-scroll ===== */
const SPEED = 20;
const tracks = {
  proj:  { el: null, inner: null, itemCount: projects.length, offset: 0, hover: false, drag: false, dir: 'right', halfWidth: 0, autoStopped: false, initialOffset: 0, initialized: false, startTime: null, pauseStartT: null },
  write: { el: null, inner: null, itemCount: writings.length, offset: 0, hover: false, drag: false, dir: 'left',  halfWidth: 0, autoStopped: false, initialOffset: 0, initialized: false, startTime: null, pauseStartT: null }
};

function measureHalfWidths() {
  for (const k of Object.keys(tracks)) {
    const t = tracks[k];
    const kids = t.inner.children;
    if (kids.length >= t.itemCount * 2) {
      t.halfWidth = kids[t.itemCount].offsetLeft - kids[0].offsetLeft;
    } else {
      t.halfWidth = t.inner.scrollWidth / 2;
    }
    const centerIdx = (k === 'proj') ? (t.itemCount - 1) : 0;
    if (kids[centerIdx] && t.halfWidth > 0) {
      const card = kids[centerIdx];
      const cardCenter = card.offsetLeft + card.offsetWidth / 2;
      const targetTx = window.innerWidth / 2 - cardCenter;
      const raw = t.dir === 'right' ? targetTx + t.halfWidth : -targetTx;
      t.initialOffset = ((raw % t.halfWidth) + t.halfWidth) % t.halfWidth;
      if (!t.initialized) {
        t.offset = t.initialOffset;
        t.initialized = true;
      }
    }
  }
}

function wrap(val, mod) {
  if (mod <= 0) return 0;
  val = val % mod;
  if (val < 0) val += mod;
  return val;
}

function animate(t) {
  const homeActive = document.getElementById('page-home').classList.contains('active');

  for (const k of Object.keys(tracks)) {
    const tr = tracks[k];
    if (!tr.halfWidth) continue;

    if (!tr.autoStopped) {
      if (tr.hover || tr.drag || !homeActive) {
        if (tr.pauseStartT == null) tr.pauseStartT = t;
      } else {
        if (tr.startTime == null) tr.startTime = t;
        if (tr.pauseStartT != null) {
          tr.startTime += (t - tr.pauseStartT);
          tr.pauseStartT = null;
        }
        const elapsedSec = (t - tr.startTime) / 1000;
        const scrolled = elapsedSec * SPEED;
        if (scrolled >= tr.halfWidth) {
          tr.offset = tr.initialOffset;
          tr.autoStopped = true;
        } else {
          tr.offset = tr.initialOffset + scrolled;
        }
      }
    }

    tr.offset = wrap(tr.offset, tr.halfWidth);
    if (tr.dir === 'right') {
      tr.inner.style.transform = `translateX(${-tr.halfWidth + tr.offset}px)`;
    } else {
      tr.inner.style.transform = `translateX(${-tr.offset}px)`;
    }
  }
  requestAnimationFrame(animate);
}

function setupDrag(trackEl, innerEl, key) {
  const tr = tracks[key];
  trackEl.addEventListener('mouseenter', () => { tr.hover = true; });
  trackEl.addEventListener('mouseleave', () => { tr.hover = false; });

  let startX = 0, startOffset = 0, moved = 0;

  const onDown = (x) => {
    tr.drag = true;
    startX = x;
    startOffset = tr.offset;
    moved = 0;
    innerEl.classList.add('dragging');
  };
  const onMove = (x) => {
    if (!tr.drag) return;
    const delta = x - startX;
    moved = Math.max(moved, Math.abs(delta));
    tr.offset = tr.dir === 'right' ? startOffset + delta : startOffset - delta;
  };
  const onUp = () => {
    if (!tr.drag) return;
    tr.drag = false;
    innerEl.classList.remove('dragging');
  };

  innerEl.addEventListener('mousedown', e => { onDown(e.clientX); });
  innerEl.addEventListener('dragstart', e => e.preventDefault());
  window.addEventListener('mousemove', e => onMove(e.clientX));
  window.addEventListener('mouseup', onUp);

  innerEl.addEventListener('touchstart', e => { onDown(e.touches[0].clientX); }, { passive: true });
  innerEl.addEventListener('touchmove', e => { onMove(e.touches[0].clientX); }, { passive: true });
  innerEl.addEventListener('touchend', onUp);
  innerEl.addEventListener('touchcancel', onUp);

  innerEl.addEventListener('click', (e) => {
    if (moved > 5) { e.preventDefault(); e.stopPropagation(); }
  }, true);
}

/* ===== Render project detail ===== */
function projectDetailHTML(p) {
  const btns = p.buttons.map(b => {
    if (b.type === 'primary') {
      const valid = b.url && b.url !== '#';
      const targetAttr = valid ? 'target="_blank" rel="noopener"' : '';
      return `<a class="btn btn-primary" href="${valid ? b.url : '#'}" ${targetAttr} data-action="visit">${escapeHTML(b.label)}</a>`;
    }
    if (b.type === 'readme')     return `<button class="btn btn-secondary" data-action="readme" data-pid="${p.id}">${escapeHTML(b.label)}</button>`;
    if (b.type === 'screenshot') return `<button class="btn btn-secondary" data-action="screenshot" data-pid="${p.id}">${escapeHTML(b.label)}</button>`;
    if (b.type === 'video')      return `<button class="btn btn-secondary" data-action="video" data-pid="${p.id}">${escapeHTML(b.label)}</button>`;
    if (b.type === 'demo')       return `<a class="btn btn-secondary" href="${escapeHTML(b.url)}" target="_blank" rel="noopener">${escapeHTML(b.label)}</a>`;
    return '';
  }).join('');

  const coverWrapClass = 'proj-cover-wrap' + (p.coverMode === 'always' ? ' always' : '');
  return `
    <section class="proj" id="proj-${p.id}">
      <div class="proj-name">${escapeHTML(p.name)}</div>
      <div class="proj-tag">${escapeHTML(p.tagline)}</div>
      <div class="proj-role">${escapeHTML(p.role)} · ${escapeHTML(p.date)}</div>
      <div class="proj-buttons">${btns}</div>
      ${p.readmeFile ? `
      <div class="proj-readme" id="readme-${p.id}" data-readme-file="${p.readmeFile}">
        <div class="proj-readme-inner">
          <div class="proj-readme-body" data-loaded="0">README 内容待补充</div>
          <div class="proj-readme-footer">
            <button class="btn btn-secondary" data-action="readme-close" data-pid="${p.id}">收起 ↑</button>
          </div>
        </div>
      </div>` : ''}
      <div class="${coverWrapClass}" id="cover-${p.id}">
        <div class="proj-cover">
          <span class="ph">${escapeHTML(p.name)}</span>
          <img src="${p.image}" alt="${escapeHTML(p.name)}" loading="lazy" onerror="this.style.display='none'">
          ${p.video ? `<video src="${p.video}" controls preload="metadata" playsinline style="display:none;"></video>` : ''}
        </div>
      </div>
      <div class="proj-desc">${escapeHTML(p.description)}</div>
    </section>
  `;
}

function renderProjects() {
  document.getElementById('projectsList').innerHTML = projects.map(projectDetailHTML).join('');

  const loadReadme = async (pid) => {
    const panel = document.getElementById(`readme-${pid}`);
    if (!panel) return;
    const body = panel.querySelector('.proj-readme-body');
    if (!body || body.dataset.loaded === '1') return;
    const file = panel.dataset.readmeFile;
    if (!file) return;
    try {
      const res = await fetch(file, { cache: 'no-cache' });
      if (res.ok) {
        const text = await res.text();
        body.innerHTML = file.endsWith('.md') ? markdownToHTML(text) : text;
      } else {
        body.innerHTML = 'README 内容待补充';
      }
    } catch (e) {
      body.innerHTML = 'README 内容待补充';
    }
    body.dataset.loaded = '1';
  };
  document.querySelectorAll('[data-action="readme"]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const pid = btn.dataset.pid;
      const panel = document.getElementById(`readme-${pid}`);
      if (!panel) return;
      if (!panel.classList.contains('open')) await loadReadme(pid);
      panel.classList.toggle('open');
    });
  });
  document.querySelectorAll('[data-action="readme-close"]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.getElementById(`readme-${btn.dataset.pid}`)?.classList.remove('open');
    });
  });
  const showCover = (pid, mode) => {
    const wrap = document.getElementById(`cover-${pid}`);
    if (!wrap) return;
    const img = wrap.querySelector('img');
    const video = wrap.querySelector('video');
    const sameMode = wrap.dataset.mode === mode;
    const isOpen = wrap.classList.contains('open');
    if (isOpen && sameMode) {
      wrap.classList.remove('open');
      wrap.dataset.mode = '';
      if (video) { video.pause(); }
      return;
    }
    wrap.classList.add('open');
    wrap.dataset.mode = mode;
    if (mode === 'video') {
      if (img) img.style.display = 'none';
      if (video) { video.style.display = ''; video.play().catch(() => {}); }
    } else {
      if (img) img.style.display = '';
      if (video) { video.pause(); video.style.display = 'none'; }
    }
  };
  document.querySelectorAll('[data-action="screenshot"]').forEach(btn => {
    btn.addEventListener('click', () => showCover(btn.dataset.pid, 'image'));
  });
  document.querySelectorAll('[data-action="video"]').forEach(btn => {
    btn.addEventListener('click', () => showCover(btn.dataset.pid, 'video'));
  });
  document.querySelectorAll('[data-action="visit"]').forEach(a => {
    a.addEventListener('click', (e) => {
      if (a.getAttribute('href') === '#') {
        e.preventDefault();
        alert('链接待补充');
      }
    });
  });
}

function writingItemHTML(w) {
  const meta = buildMeta(w, 'write-likes');

  // Multi-asset row (e.g. 干将莫邪: 剧本 + 排名截图)

        <div class="write-item-btns">${btns}</div>

  const external = w.url && w.url.startsWith('http');

    </a>

}
function renderWriting() {
  document.getElementById('writingList').innerHTML = writings.map(writingItemHTML).join('');
  document.querySelectorAll('[data-placeholder="1"]').forEach(a => {
    a.addEventListener('click', (e) => {
      e.preventDefault();
      alert('链接待补充');
    });
  });
}

/* ===== Router ===== */
let pendingScrollId = null;

function route() {
  const raw = location.hash.replace('#', '') || 'home';
  const valid = ['home', 'projects', 'writing'];
  const target = valid.includes(raw) ? raw : 'home';

  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const page = document.getElementById(`page-${target}`);
  if (page) page.classList.add('active');

  document.querySelectorAll('.nav-link').forEach(n => {
    n.classList.toggle('active', n.dataset.page === target);
  });

  if (pendingScrollId) {
    const id = pendingScrollId;
    pendingScrollId = null;
    requestAnimationFrame(() => {
      const el = document.getElementById(id);
      if (el) {
        const top = el.getBoundingClientRect().top + window.pageYOffset - 72;
        window.scrollTo({ top, behavior: 'smooth' });
      } else {
        window.scrollTo(0, 0);
      }
    });
  } else {
    window.scrollTo(0, 0);
  }
}

/* ===== Init ===== */
document.addEventListener('DOMContentLoaded', () => {
  renderCarousel();
  renderProjects();
  renderWriting();

  tracks.proj.el = document.getElementById('trackProjects');
  tracks.proj.inner = document.getElementById('projectsTrack');
  tracks.write.el = document.getElementById('trackWriting');
  tracks.write.inner = document.getElementById('writingTrack');

  measureHalfWidths();
  window.addEventListener('resize', measureHalfWidths);
  // Re-measure after fonts load (widths may shift)
  if (document.fonts && document.fonts.ready) {
    document.fonts.ready.then(measureHalfWidths);
  }

  setupDrag(tracks.proj.el, tracks.proj.inner, 'proj');
  setupDrag(tracks.write.el, tracks.write.inner, 'write');

  // Project card click → navigate and scroll to target project
  document.querySelectorAll('.pcard[data-pid]').forEach(card => {
    card.addEventListener('click', () => {
      pendingScrollId = `proj-${card.dataset.pid}`;
    });
  });

  // Lightbox for write-page credential
  const lb = document.getElementById('lightbox');
  document.querySelectorAll('[data-lightbox]').forEach(el => {
    el.addEventListener('click', (e) => {
      e.preventDefault();
      const src = el.dataset.lightbox;
      if (!src) return;
      lb.querySelector('img').src = src;
      lb.classList.add('open');
    });
  });
  lb.addEventListener('click', () => lb.classList.remove('open'));
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') lb.classList.remove('open');
  });

  route();
  window.addEventListener('hashchange', route);

  requestAnimationFrame(animate);
});
